<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prepositions Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;color:#e8e4f0;font-family:Georgia,serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#1a0a3a 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#0a1a3a 0%,transparent 60%);pointer-events:none;z-index:0}

/* MENU */
#menuScreen{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}
.badge{background:linear-gradient(135deg,#e06c2a,#c0392b);color:#fff;font-size:11px;letter-spacing:3px;padding:4px 14px;border-radius:20px}
.mainTitle{font-size:34px;font-weight:700;text-align:center;background:linear-gradient(135deg,#ffd6a5,#ff9a5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#94a3b8;font-size:14px}
.card{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(224,108,42,0.25);border-radius:16px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s}
.card.active{border:2px solid #e06c2a;background:rgba(224,108,42,0.08)}
.cardIcon{font-size:32px}
.cardTitle{font-size:17px;font-weight:700;color:#ffd6a5}
.cardSub{font-size:12px;color:#64748b}
.tagRow{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:4px}
.tag{background:rgba(224,108,42,0.2);border:1px solid rgba(224,108,42,0.4);color:#ffd6a5;font-size:10px;padding:2px 8px;border-radius:20px}
.selectedLbl{font-size:11px;color:#e06c2a;margin-top:2px}
.startBtn{margin-top:4px;padding:13px 44px;background:linear-gradient(135deg,#e06c2a,#c0392b);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;box-shadow:0 4px 20px rgba(224,108,42,0.4)}

/* QUIZ */
#quizScreen{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 80px;display:none}
.topBar{position:sticky;top:0;z-index:10;background:rgba(15,15,26,0.95);backdrop-filter:blur(12px);padding:10px 0;display:flex;align-items:center;gap:12px;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.backBtn{background:transparent;border:1px solid rgba(255,255,255,0.15);color:#94a3b8;padding:6px 12px;border-radius:8px;font-size:12px;white-space:nowrap}
.progWrap{flex:1;display:flex;align-items:center;gap:8px}
.progBar{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.progFill{height:100%;background:linear-gradient(90deg,#e06c2a,#ffd6a5);border-radius:3px;transition:width .3s;width:0%}
.progTxt{font-size:11px;color:#64748b;white-space:nowrap}
.qList{display:flex;flex-direction:column;gap:16px}
.qCard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;gap:10px}
.qNum{font-size:10px;color:#e06c2a;letter-spacing:1px;font-weight:700}
.qText{font-size:14px;line-height:1.7;color:#e2e8f0}
.optGrid{display:flex;flex-direction:column;gap:7px}
.optBtn{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 12px;color:#cbd5e1;font-size:13px;text-align:left;width:100%}
.optBtn.chosen{background:rgba(224,108,42,0.2);border:1px solid #e06c2a;color:#ffd6a5}
.optBtn.correct{background:rgba(34,197,94,0.12);border:1px solid #22c55e;color:#86efac}
.optBtn.wrong{background:rgba(239,68,68,0.12);border:1px solid #ef4444;color:#fca5a5}
.optLbl{min-width:20px;height:20px;background:rgba(255,255,255,0.08);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#94a3b8;flex-shrink:0}
.submitWrap{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:rgba(15,15,26,0.95);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:center;z-index:10}
.submitBtn{padding:12px 56px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;box-shadow:0 4px 18px rgba(34,197,94,0.35)}

/* RESULT */
#resultScreen{position:relative;z-index:1;max-width:400px;margin:0 auto;padding:60px 20px 40px;display:none;flex-direction:column;align-items:center;gap:26px}
.gradeCircle{width:90px;height:90px;border-radius:50%;border:4px solid;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900}
.scoreNum{font-size:28px;font-weight:700}
.scorePct{font-size:15px;color:#94a3b8}
.resActions{display:flex;flex-direction:column;gap:10px;width:100%}
.btn1{padding:13px;background:linear-gradient(135deg,#e06c2a,#c0392b);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700}
.btn2{padding:13px;background:rgba(255,255,255,0.05);color:#ffd6a5;border:1px solid rgba(224,108,42,0.3);border-radius:11px;font-size:14px}
.btn3{padding:13px;background:transparent;color:#64748b;border:1px solid rgba(255,255,255,0.08);border-radius:11px;font-size:14px}

/* REVIEW */
#reviewScreen{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 80px;display:none}
.reviewScore{color:#ffd6a5;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="bg"></div>

<!-- MENU -->
<div id="menuScreen">
  <div class="badge">GRAMMAR</div>
  <h1 class="mainTitle">Prepositions</h1>
  <p class="sub">Бүлэг сонгоно уу</p>
  <div id="chapCards"></div>
  <button class="startBtn" onclick="startQuiz()">Эхлэх →</button>
</div>

<!-- QUIZ -->
<div id="quizScreen">
  <div class="topBar">
    <button class="backBtn" onclick="toMenu()">← Menu</button>
    <div class="progWrap">
      <div class="progBar"><div class="progFill" id="progFill"></div></div>
      <span class="progTxt" id="progTxt">0/0</span>
    </div>
  </div>
  <div class="qList" id="qList"></div>
  <div class="submitWrap">
    <button class="submitBtn" onclick="submitQuiz()">Дуусгах ✓</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen">
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
    <div class="gradeCircle" id="gradeCircle"></div>
    <div class="scoreNum" id="scoreNum"></div>
    <div class="scorePct" id="scorePct"></div>
  </div>
  <div class="resActions">
    <button class="btn1" onclick="restart()">🔄 Дахин оролдох</button>
    <button class="btn2" onclick="showReview()">👁 Хариулт харах</button>
    <button class="btn3" onclick="toMenu()">🏠 Меню</button>
  </div>
</div>

<!-- REVIEW -->
<div id="reviewScreen">
  <div class="topBar">
    <button class="backBtn" onclick="showResult()">← Буцах</button>
    <span class="reviewScore" id="reviewScore"></span>
  </div>
  <div class="qList" id="reviewList"></div>
</div>

<script>
const LABELS=["A","B","C"];

const chapters=[
  {
    id:1,title:"Prepositions",subtitle:"43 асуулт",icon:"📌",
    topics:["at / in / on","for / during","to / from","by / with","Time & Place"],
    questions:[
      {id:1,text:"He started going ___ school ___ the age of five.",options:["at / in","to / at","in / at"],answer:1},
      {id:2,text:"I'm going to Rome ___ Monday ___ Tom. Would you like to come?",options:["in / for","at / to","on / with"],answer:2},
      {id:3,text:"___ the beginning of a textbook there is a preface, and ___ the end an index.",options:["In / in","At / at","On / at"],answer:1},
      {id:4,text:"Could I speak ___ Tom, please? — I'm afraid Tom's ___ work.",options:["to / at","with / at","to / in"],answer:0},
      {id:5,text:"We arrived ___ the airport ___ time for the plane.",options:["in / on","at / in","at / on"],answer:1},
      {id:6,text:"Our train arrived ___ York ___ 6:30. Paul met us ___ the station.",options:["in / at / at","at / in / at","in / in / in"],answer:0},
      {id:7,text:"It's stupid to get angry ___ me ___ being late.",options:["at / for","with / about","with / for"],answer:2},
      {id:8,text:"It rained ___ three days without stopping.",options:["during","for","in"],answer:1},
      {id:9,text:"The bus was late this morning but it's usually ___ time.",options:["in","at","on"],answer:2},
      {id:10,text:"A man came ___ of the house and got ___ a car.",options:["out / into","off / into","out / in"],answer:0},
      {id:11,text:"___ first we didn't like each other very much, but ___ the end we became good friends.",options:["At / at","In / in","At / in"],answer:2},
      {id:12,text:"Who is that man standing ___ the bus stop?",options:["in","on","at"],answer:2},
      {id:13,text:"My brother lives ___ a small village ___ the south-west of England.",options:["at / in","in / in","in / at"],answer:1},
      {id:14,text:"There were two pictures ___ the wall and a notice ___ the door.",options:["at / on","on / at","on / on"],answer:2},
      {id:15,text:"They went ___ holidays ___ Ibiza last summer.",options:["for / to","on / in","on / to"],answer:2},
      {id:16,text:"Jack has gone away. He'll be back ___ two weeks.",options:["for","after","in"],answer:2},
      {id:17,text:"Does your sister work ___ the evenings? — No, just ___ night.",options:["at / at","in / in","in / at"],answer:2},
      {id:18,text:"The telephone and the doorbell rang ___ the same time.",options:["in","on","at"],answer:2},
      {id:19,text:"The course begins ___ 7 January and ends ___ April.",options:["in / in","on / in","at / in"],answer:1},
      {id:20,text:"She fell asleep ___ the film.",options:["while","during","for"],answer:1},
      {id:21,text:"Jenny's brother is an engineer but he's out of work ___ the moment.",options:["in","for","at"],answer:2},
      {id:22,text:"I'm sorry ___ shouting at you yesterday.",options:["about","of","for"],answer:2},
      {id:23,text:"When I came in there was no one ___ the room.",options:["at","inside","in"],answer:2},
      {id:24,text:"There is some water ___ the bottle. That bottle has a label ___ it.",options:["in / on","inside / on","in / at"],answer:0},
      {id:25,text:"Don't listen ___ what he says. He doesn't know what he is talking ___ .",options:["to / about","to / of","at / about"],answer:0},
      {id:26,text:"She can't read ___ glasses. She needs glasses to read.",options:["with no","without","not with"],answer:1},
      {id:27,text:"You look serious. What are you thinking ___ ?",options:["of","on","about"],answer:2},
      {id:28,text:"The television is ___ the corner of the living room.",options:["in","at","on"],answer:0},
      {id:29,text:"There is a telephone box ___ the corner of the street.",options:["in","on","at"],answer:1},
      {id:30,text:"In Britain they drive ___ the left.",options:["at","on","to"],answer:1},
      {id:31,text:"We stopped ___ a small village ___ the way to London.",options:["in / on","at / on","at / in"],answer:1},
      {id:32,text:"Where is Mark? — I think he's still ___ bed. He must be ___ work.",options:["at / at","in / in","in / at"],answer:2},
      {id:33,text:"We stayed ___ a very nice hotel when we were ___ Amsterdam.",options:["at / in","in / in","at / at"],answer:0},
      {id:34,text:"There was an interesting programme ___ the television this morning.",options:["in","on","at"],answer:1},
      {id:35,text:"Did you pay ___ cheque or ___ cash? — Neither. I paid ___ credit card.",options:["with / with / with","by / by / by","by / with / by"],answer:1},
      {id:36,text:"She's been ___ hospital ___ October. She had a car accident two months ago.",options:["in / since","at / since","in / from"],answer:0},
      {id:37,text:"How long is he going to stay here? — ___ Friday.",options:["By","Until","For"],answer:1},
      {id:38,text:"The library is open ___ nine in the morning ___ five o'clock.",options:["since / to","from / for","from / until"],answer:2},
      {id:39,text:"What did you do yesterday? We went ___ a walk ___ dinner.",options:["on / for","for / to","for / for"],answer:2},
      {id:40,text:"She fell in love ___ an old man who lived opposite her.",options:["for","with","of"],answer:1},
      {id:41,text:"How do you usually go to work ___ the mornings? — It depends ___ the weather. I sometimes go ___ foot but I usually go ___ bus.",options:["on / on / on / by","in / on / on / by","in / on / by / by"],answer:1},
      {id:42,text:"I don't like going up ladders. I'm afraid ___ heights.",options:["about","of","for"],answer:1},
      {id:43,text:"I've lost my keys. Can you help me to look ___ them?",options:["for","after","at"],answer:0},
    ]
  },
  {
    id:2,title:"Adjective + Preposition",subtitle:"26 асуулт",icon:"🎯",
    topics:["fond of","keen on","good at","interested in","afraid of"],
    questions:[
      {id:1,text:"Her patience makes her fit ___ this job as a Primary teacher.",options:["to","for","in"],answer:1},
      {id:2,text:"She is fond ___ designing her own necklaces and brooches.",options:["of","about","for"],answer:0},
      {id:3,text:"Mum is frightened ___ rats.",options:["by","about","of"],answer:2},
      {id:4,text:"My aunt Alice is great ___ cooking and she's completely hooked ___ making cupcakes.",options:["at / on","in / on","at / about"],answer:0},
      {id:5,text:"Being hard-working and sensible is important ___ becoming successful ___ business.",options:["in / in","for / at","for / in"],answer:2},
      {id:6,text:"Ryan is interested ___ animal photography. Now he is involved ___ a new project in Africa.",options:["in / with","about / in","in / in"],answer:2},
      {id:7,text:"I'm keen ___ jogging every day.",options:["on","about","for"],answer:0},
      {id:8,text:"Alan lost his new job because he was always late ___ work.",options:["to","at","for"],answer:2},
      {id:9,text:"When you are a grown-up, you are liable ___ your actions.",options:["for","to","of"],answer:0},
      {id:10,text:"Mum is completely mad ___ the new cookery program on TV.",options:["for","about","with"],answer:1},
      {id:11,text:"This spectacular fireplace is made ___ white marble.",options:["from","of","with"],answer:1},
      {id:12,text:"Teachers are always unhappy ___ lazy students.",options:["about","with","at"],answer:1},
      {id:13,text:"I'm pleased ___ meet you, Mr. Williams. Welcome to the hotel.",options:["to","for","about"],answer:0},
      {id:14,text:"Online videos are popular ___ most teenagers nowadays.",options:["among","for","with"],answer:2},
      {id:15,text:"Mum is very proud ___ my marks this term. They are great!",options:["about","of","for"],answer:1},
      {id:16,text:"The students were ready ___ the exam although they were really nervous.",options:["for","to","about"],answer:0},
      {id:17,text:"Sorry but this comment is not relevant ___ the issue.",options:["for","with","to"],answer:2},
      {id:18,text:"Everybody is responsible ___ the environmental problems.",options:["of","for","about"],answer:1},
      {id:19,text:"Tom is really worried ___ tomorrow's exam.",options:["about","for","of"],answer:0},
      {id:20,text:"Harper was really scared ___ spiders. She can't stand them!",options:["by","about","of"],answer:2},
      {id:21,text:"Your bag is similar ___ mine.",options:["to","as","with"],answer:0},
      {id:22,text:"I feel very sorry ___ Tina. She looks so sad.",options:["about","of","for"],answer:2},
      {id:23,text:"Margaret Flynn watched really surprised ___ her husband when he gave her a diamond ring.",options:["at","by","of"],answer:0},
      {id:24,text:"The man who was arrested yesterday is suspicious ___ robbing the national bank.",options:["for","of","about"],answer:1},
      {id:25,text:"The children felt terrified ___ the strange noises they heard.",options:["about","by","of"],answer:1},
      {id:26,text:"I'm tired ___ asking you to return my book!",options:["from","of","about"],answer:1},
    ]
  }
];

let chapIdx=0;
let answers={};
let currentScreen="menu";

function init(){
  renderChapCards();
  showScreen("menu");
}

function renderChapCards(){
  const container=document.getElementById("chapCards");
  container.innerHTML="";
  container.style.cssText="display:flex;flex-direction:column;gap:14px;width:100%";
  chapters.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="card"+(chapIdx===i?" active":"");
    div.onclick=()=>selectChap(i);
    div.innerHTML=`
      <div class="cardIcon">${c.icon}</div>
      <div class="cardTitle">${c.title}</div>
      <div class="cardSub">${c.subtitle}</div>
      <div class="tagRow">${c.topics.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      ${chapIdx===i?'<div class="selectedLbl">✓ Сонгосон</div>':""}
    `;
    container.appendChild(div);
  });
}

function selectChap(i){
  chapIdx=i;
  renderChapCards();
}

function showScreen(name){
  currentScreen=name;
  document.getElementById("menuScreen").style.display=name==="menu"?"flex":"none";
  document.getElementById("quizScreen").style.display=name==="quiz"?"block":"none";
  document.getElementById("resultScreen").style.display=name==="result"?"flex":"none";
  document.getElementById("reviewScreen").style.display=name==="review"?"block":"none";
}

function startQuiz(){
  answers={};
  renderQuiz();
  showScreen("quiz");
}

function getQs(){return chapters[chapIdx].questions;}

function renderQuiz(){
  const qs=getQs();
  const list=document.getElementById("qList");
  list.innerHTML="";
  qs.forEach(q=>{
    const card=document.createElement("div");
    card.className="qCard";
    card.id="qcard-"+q.id;
    card.innerHTML=`
      <div class="qNum">Q${q.id}</div>
      <div class="qText">${q.text}</div>
      <div class="optGrid" id="opts-${q.id}">
        ${q.options.map((opt,i)=>`
          <button class="optBtn" id="opt-${q.id}-${i}" onclick="pick(${q.id},${i})">
            <span class="optLbl">${LABELS[i]}</span>${opt}
          </button>
        `).join("")}
      </div>
    `;
    list.appendChild(card);
  });
  updateProgress();
}

function pick(qid,i){
  answers[qid]=i;
  const qs=getQs();
  const q=qs.find(x=>x.id===qid);
  q.options.forEach((_,j)=>{
    const btn=document.getElementById(`opt-${qid}-${j}`);
    btn.className="optBtn"+(j===i?" chosen":"");
  });
  updateProgress();
}

function updateProgress(){
  const qs=getQs();
  const done=Object.keys(answers).length;
  const total=qs.length;
  document.getElementById("progFill").style.width=(done/total*100)+"%";
  document.getElementById("progTxt").textContent=done+"/"+total;
}

function submitQuiz(){
  const qs=getQs();
  if(Object.keys(answers).length<qs.length){
    alert(`Бүх ${qs.length} асуултад хариулна уу! (${Object.keys(answers).length} хариулсан)`);
    return;
  }
  showResult();
}

function calcScore(){
  const qs=getQs();
  return qs.filter(q=>answers[q.id]===q.answer).length;
}

function showResult(){
  const qs=getQs();
  const score=calcScore();
  const pct=Math.round(score/qs.length*100);
  const grade=pct>=90?"A+":pct>=80?"A":pct>=70?"B":pct>=60?"C":pct>=50?"D":"F";
  const gc=pct>=80?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
  document.getElementById("gradeCircle").textContent=grade;
  document.getElementById("gradeCircle").style.borderColor=gc;
  document.getElementById("gradeCircle").style.color=gc;
  document.getElementById("scoreNum").textContent=score+"/"+qs.length;
  document.getElementById("scorePct").textContent=pct+"%";
  showScreen("result");
}

function showReview(){
  const qs=getQs();
  const score=calcScore();
  document.getElementById("reviewScore").textContent="Хариулт — "+score+"/"+qs.length;
  const list=document.getElementById("reviewList");
  list.innerHTML="";
  qs.forEach(q=>{
    const chosen=answers[q.id],correct=q.answer,right=chosen===correct;
    const card=document.createElement("div");
    card.className="qCard";
    card.style.borderLeft=`4px solid ${right?"#22c55e":"#ef4444"}`;
    card.innerHTML=`
      <div style="display:flex;gap:8px;align-items:center">
        <div class="qNum">Q${q.id}</div>
        <span>${right?"✅":"❌"}</span>
      </div>
      <div class="qText">${q.text}</div>
      <div class="optGrid">
        ${q.options.map((opt,i)=>{
          const isC=i===correct,isW=i===chosen&&!isC;
          return`<div class="optBtn${isC?" correct":""}${isW?" wrong":""}" style="cursor:default">
            <span class="optLbl">${LABELS[i]}</span>${opt}${isC?" ✓":""}${isW?" ✗":""}
          </div>`;
        }).join("")}
      </div>
    `;
    list.appendChild(card);
  });
  showScreen("review");
}

function restart(){
  answers={};
  renderQuiz();
  showScreen("quiz");
}

function toMenu(){
  answers={};
  showScreen("menu");
}

init();
</script>
</body>
</html>
