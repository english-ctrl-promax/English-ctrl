<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prepositions Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f0f1a;color:#e8e4f0;font-family:Georgia,serif;min-height:100vh}button{font-family:inherit}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;

const chapters=[
  {
    id:1,title:"Prepositions",subtitle:"43 асуулт",icon:"📌",
    topics:["at / in / on","for / during","to / from","by / with","Time & Place"],
    questions:[
      {id:1,text:"He started going ___ school ___ the age of five.",options:["at / in","to / at","in / at"],answer:1},
      {id:2,text:"I'm going to Rome ___ Monday ___ Tom. Would you like to come?",options:["in / for","at / to","on / with"],answer:2},
      {id:3,text:"___ the beginning of a textbook there is a preface, and ___ the end an index.",options:["In / in","At / at","On / at"],answer:1},
      {id:4,text:"Could I speak ___ Tom, please? — I'm afraid Tom's ___ work.",options:["to / at","with / at","to / in"],answer:0},
      {id:5,text:"We arrived ___ the airport ___ time for the plane.",options:["in / on","at / in","at / on"],answer:1},
      {id:6,text:"Our train arrived ___ York ___ 6:30. Paul met us ___ the station.",options:["in / at / at","at / in / at","in / in / in"],answer:0},
      {id:7,text:"It's stupid to get angry ___ me ___ being late.",options:["at / for","with / about","with / for"],answer:2},
      {id:8,text:"It rained ___ three days without stopping.",options:["during","for","in"],answer:1},
      {id:9,text:"The bus was late this morning but it's usually ___ time.",options:["in","at","on"],answer:2},
      {id:10,text:"A man came ___ of the house and got ___ a car.",options:["out / into","off / into","out / in"],answer:0},
      {id:11,text:"___ first we didn't like each other very much, but ___ the end we became good friends.",options:["At / at","In / in","At / in"],answer:2},
      {id:12,text:"Who is that man standing ___ the bus stop?",options:["in","on","at"],answer:2},
      {id:13,text:"My brother lives ___ a small village ___ the south-west of England.",options:["at / in","in / in","in / at"],answer:1},
      {id:14,text:"There were two pictures ___ the wall and a notice ___ the door.",options:["at / on","on / at","on / on"],answer:2},
      {id:15,text:"They went ___ holidays ___ Ibiza last summer.",options:["for / to","on / in","on / to"],answer:2},
      {id:16,text:"Jack has gone away. He'll be back ___ two weeks.",options:["for","after","in"],answer:2},
      {id:17,text:"Does your sister work ___ the evenings? — No, just ___ night.",options:["at / at","in / in","in / at"],answer:2},
      {id:18,text:"The telephone and the doorbell rang ___ the same time.",options:["in","on","at"],answer:2},
      {id:19,text:"The course begins ___ 7 January and ends ___ April.",options:["in / in","on / in","at / in"],answer:1},
      {id:20,text:"She fell asleep ___ the film.",options:["while","during","for"],answer:1},
      {id:21,text:"Jenny's brother is an engineer but he's out of work ___ the moment.",options:["in","for","at"],answer:2},
      {id:22,text:"I'm sorry ___ shouting at you yesterday.",options:["about","of","for"],answer:2},
      {id:23,text:"When I came in there was no one ___ the room.",options:["at","inside","in"],answer:2},
      {id:24,text:"There is some water ___ the bottle. That bottle has a label ___ it.",options:["in / on","inside / on","in / at"],answer:0},
      {id:25,text:"Don't listen ___ what he says. He doesn't know what he is talking ___ .",options:["to / about","to / of","at / about"],answer:0},
      {id:26,text:"She can't read ___ glasses. She needs glasses to read.",options:["with no","without","not with"],answer:1},
      {id:27,text:"You look serious. What are you thinking ___ ?",options:["of","on","about"],answer:2},
      {id:28,text:"The television is ___ the corner of the living room.",options:["in","at","on"],answer:0},
      {id:29,text:"There is a telephone box ___ the corner of the street.",options:["in","on","at"],answer:1},
      {id:30,text:"In Britain they drive ___ the left.",options:["at","on","to"],answer:1},
      {id:31,text:"We stopped ___ a small village ___ the way to London.",options:["in / on","at / on","at / in"],answer:1},
      {id:32,text:"Where is Mark? — I think he's still ___ bed. He must be ___ work.",options:["at / at","in / in","in / at"],answer:2},
      {id:33,text:"We stayed ___ a very nice hotel when we were ___ Amsterdam.",options:["at / in","in / in","at / at"],answer:0},
      {id:34,text:"There was an interesting programme ___ the television this morning.",options:["in","on","at"],answer:1},
      {id:35,text:"Did you pay ___ cheque or ___ cash? — Neither. I paid ___ credit card.",options:["with / with / with","by / by / by","by / with / by"],answer:1},
      {id:36,text:"She's been ___ hospital ___ October. She had a car accident two months ago.",options:["in / since","at / since","in / from"],answer:0},
      {id:37,text:"How long is he going to stay here? — ___ Friday.",options:["By","Until","For"],answer:1},
      {id:38,text:"The library is open ___ nine in the morning ___ five o'clock.",options:["since / to","from / for","from / until"],answer:2},
      {id:39,text:"What did you do yesterday? We went ___ a walk ___ dinner.",options:["on / for","for / to","for / for"],answer:2},
      {id:40,text:"She fell in love ___ an old man who lived opposite her.",options:["for","with","of"],answer:1},
      {id:41,text:"How do you usually go to work ___ the mornings? — It depends ___ the weather. I sometimes go ___ foot but I usually go ___ bus.",options:["on / on / on / by","in / on / on / by","in / on / by / by"],answer:1},
      {id:42,text:"I don't like going up ladders. I'm afraid ___ heights.",options:["about","of","for"],answer:1},
      {id:43,text:"I've lost my keys. Can you help me to look ___ them?",options:["for","after","at"],answer:0},
    ]
  },
  {
    id:2,title:"Adjective + Preposition",subtitle:"26 асуулт",icon:"🎯",
    topics:["fond of","keen on","good at","interested in","afraid of"],
    questions:[
      {id:15,text:"Her patience makes her fit ___ this job as a Primary teacher.",options:["to","for","in"],answer:1},
      {id:16,text:"She is fond ___ designing her own necklaces and brooches.",options:["of","about","for"],answer:0},
      {id:17,text:"Mum is frightened ___ rats.",options:["by","about","of"],answer:2},
      {id:18,text:"My aunt Alice is great ___ cooking and she's completely hooked ___ making cupcakes.",options:["at / on","in / on","at / about"],answer:0},
      {id:19,text:"Being hard-working and sensible is important ___ becoming successful ___ business.",options:["in / in","for / at","for / in"],answer:2},
      {id:20,text:"Ryan is interested ___ animal photography. Now he is involved ___ a new project in Africa.",options:["in / with","about / in","in / in"],answer:2},
      {id:21,text:"I'm keen ___ jogging every day.",options:["on","about","for"],answer:0},
      {id:22,text:"Alan lost his new job because he was always late ___ work.",options:["to","at","for"],answer:2},
      {id:23,text:"When you are a grown-up, you are liable ___ your actions.",options:["for","to","of"],answer:0},
      {id:24,text:"Mum is completely mad ___ the new cookery program on TV.",options:["for","about","with"],answer:1},
      {id:25,text:"This spectacular fireplace is made ___ white marble.",options:["from","of","with"],answer:1},
      {id:26,text:"Teachers are always unhappy ___ lazy students.",options:["about","with","at"],answer:1},
      {id:27,text:"I'm pleased ___ meet you, Mr. Williams. Welcome to the hotel.",options:["to","for","about"],answer:0},
      {id:28,text:"Online videos are popular ___ most teenagers nowadays.",options:["among","for","with"],answer:2},
      {id:29,text:"Mum is very proud ___ my marks this term. They are great!",options:["about","of","for"],answer:1},
      {id:30,text:"The students were ready ___ the exam although they were really nervous.",options:["for","to","about"],answer:0},
      {id:31,text:"Sorry but this comment is not relevant ___ the issue.",options:["for","with","to"],answer:2},
      {id:32,text:"Everybody is responsible ___ the environmental problems.",options:["of","for","about"],answer:1},
      {id:33,text:"Tom is really worried ___ tomorrow's exam.",options:["about","for","of"],answer:0},
      {id:34,text:"Harper was really scared ___ spiders. She can't stand them!",options:["by","about","of"],answer:2},
      {id:35,text:"Your bag is similar ___ mine.",options:["to","as","with"],answer:0},
      {id:36,text:"I feel very sorry ___ Tina. She looks so sad.",options:["about","of","for"],answer:2},
      {id:37,text:"Margaret Flynn watched really surprised ___ her husband when he gave her a diamond ring.",options:["at","by","of"],answer:0},
      {id:38,text:"The man who was arrested yesterday is suspicious ___ robbing the national bank.",options:["for","of","about"],answer:1},
      {id:39,text:"The children felt terrified ___ the strange noises they heard.",options:["about","by","of"],answer:1},
      {id:40,text:"I'm tired ___ asking you to return my book!",options:["from","of","about"],answer:1},
    ]
  }
];

const LABELS=["A","B","C"];

const S={
  root:{minHeight:"100vh",background:"#0f0f1a",color:"#e8e4f0"},
  bg:{position:"fixed",inset:0,background:"radial-gradient(ellipse at 20% 20%,#1a0a3a 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#0a1a3a 0%,transparent 60%)",pointerEvents:"none",zIndex:0},
  wrap:{position:"relative",zIndex:1,maxWidth:680,margin:"0 auto",padding:"0 16px 80px"},
  menuWrap:{position:"relative",zIndex:1,maxWidth:480,margin:"0 auto",padding:"40px 20px 40px",display:"flex",flexDirection:"column",alignItems:"center",gap:14},
  badge:{background:"linear-gradient(135deg,#e06c2a,#c0392b)",color:"#fff",fontSize:11,letterSpacing:3,padding:"4px 14px",borderRadius:20},
  title:{fontSize:34,fontWeight:700,textAlign:"center",margin:0,background:"linear-gradient(135deg,#ffd6a5,#ff9a5c)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"},
  sub:{color:"#94a3b8",fontSize:14,margin:0},
  card:{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(224,108,42,0.25)",borderRadius:16,padding:"18px 18px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:"pointer",transition:"border-color .2s"},
  cardActive:{border:"2px solid #e06c2a",background:"rgba(224,108,42,0.08)"},
  cardIcon:{fontSize:32},
  cardTitle:{fontSize:17,fontWeight:700,color:"#ffd6a5"},
  cardSub:{fontSize:12,color:"#64748b"},
  tagRow:{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginTop:4},
  tag:{background:"rgba(224,108,42,0.2)",border:"1px solid rgba(224,108,42,0.4)",color:"#ffd6a5",fontSize:10,padding:"2px 8px",borderRadius:20},
  startBtn:{marginTop:4,padding:"13px 44px",background:"linear-gradient(135deg,#e06c2a,#c0392b)",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(224,108,42,0.4)"},
  topBar:{position:"sticky",top:0,zIndex:10,background:"rgba(15,15,26,0.95)",backdropFilter:"blur(12px)",padding:"10px 0",display:"flex",alignItems:"center",gap:12,marginBottom:16,borderBottom:"1px solid rgba(255,255,255,0.06)"},
  backBtn:{background:"transparent",border:"1px solid rgba(255,255,255,0.15)",color:"#94a3b8",padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"},
  progWrap:{flex:1,display:"flex",alignItems:"center",gap:8},
  progBar:{flex:1,height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"},
  progFill:{height:"100%",background:"linear-gradient(90deg,#e06c2a,#ffd6a5)",borderRadius:3,transition:"width .3s"},
  progTxt:{fontSize:11,color:"#64748b",whiteSpace:"nowrap"},
  qList:{display:"flex",flexDirection:"column",gap:16},
  qCard:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"16px 14px",display:"flex",flexDirection:"column",gap:10},
  qNum:{fontSize:10,color:"#e06c2a",letterSpacing:1,fontWeight:700},
  qText:{fontSize:14,lineHeight:1.7,color:"#e2e8f0",whiteSpace:"pre-line"},
  optGrid:{display:"flex",flexDirection:"column",gap:7},
  optBtn:{display:"flex",alignItems:"center",gap:9,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#cbd5e1",fontSize:13,cursor:"pointer",textAlign:"left",width:"100%"},
  optChosen:{background:"rgba(224,108,42,0.2)",border:"1px solid #e06c2a",color:"#ffd6a5"},
  optCorrect:{background:"rgba(34,197,94,0.12)",border:"1px solid #22c55e",color:"#86efac"},
  optWrong:{background:"rgba(239,68,68,0.12)",border:"1px solid #ef4444",color:"#fca5a5"},
  optLbl:{minWidth:20,height:20,background:"rgba(255,255,255,0.08)",borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#94a3b8",flexShrink:0},
  submitWrap:{position:"fixed",bottom:0,left:0,right:0,padding:"12px 20px",background:"rgba(15,15,26,0.95)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"center",zIndex:10},
  submitBtn:{padding:"12px 56px",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 18px rgba(34,197,94,0.35)"},
  resWrap:{position:"relative",zIndex:1,maxWidth:400,margin:"0 auto",padding:"60px 20px 40px",display:"flex",flexDirection:"column",alignItems:"center",gap:26},
  gradeCircle:{width:90,height:90,borderRadius:"50%",border:"4px solid",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,fontWeight:900},
  scoreNum:{fontSize:28,fontWeight:700},
  scorePct:{fontSize:15,color:"#94a3b8"},
  resActions:{display:"flex",flexDirection:"column",gap:10,width:"100%"},
  btn1:{padding:"13px",background:"linear-gradient(135deg,#e06c2a,#c0392b)",color:"#fff",border:"none",borderRadius:11,fontSize:14,fontWeight:700,cursor:"pointer"},
  btn2:{padding:"13px",background:"rgba(255,255,255,0.05)",color:"#ffd6a5",border:"1px solid rgba(224,108,42,0.3)",borderRadius:11,fontSize:14,cursor:"pointer"},
  btn3:{padding:"13px",background:"transparent",color:"#64748b",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,fontSize:14,cursor:"pointer"},
};

function App(){
  const [chapIdx,setChapIdx]=useState(0);
  const [answers,setAnswers]=useState({});
  const [screen,setScreen]=useState("menu");

  const ch=chapters[chapIdx];
  const qs=ch.questions;
  const score=qs.filter(q=>answers[q.id]===q.answer).length;
  const pct=Math.round(score/qs.length*100);
  const grade=pct>=90?"A+":pct>=80?"A":pct>=70?"B":pct>=60?"C":pct>=50?"D":"F";
  const gc=pct>=80?"#22c55e":pct>=60?"#f59e0b":"#ef4444";

  const pick=(qid,i)=>{if(screen!=="quiz")return;setAnswers(p=>({...p,[qid]:i}));};
  const submit=()=>{
    if(Object.keys(answers).length<qs.length){alert(`Бүх ${qs.length} асуултад хариулна уу! (${Object.keys(answers).length} хариулсан)`);return;}
    setScreen("result");
  };
  const restart=()=>{setAnswers({});setScreen("quiz");};
  const toMenu=()=>{setAnswers({});setScreen("menu");};

  return(
    <div style={S.root}>
      <div style={S.bg}/>

      {screen==="menu"&&(
        <div style={S.menuWrap}>
          <div style={S.badge}>GRAMMAR</div>
          <h1 style={S.title}>Prepositions</h1>
          <p style={S.sub}>Бүлэг сонгоно уу</p>
          {chapters.map((c,i)=>(
            <div key={c.id} style={{...S.card,...(chapIdx===i?S.cardActive:{})}} onClick={()=>setChapIdx(i)}>
              <div style={S.cardIcon}>{c.icon}</div>
              <div style={S.cardTitle}>{c.title}</div>
              <div style={S.cardSub}>{c.subtitle}</div>
              <div style={S.tagRow}>{c.topics.map(t=><span key={t} style={S.tag}>{t}</span>)}</div>
              {chapIdx===i&&<div style={{fontSize:11,color:"#e06c2a",marginTop:2}}>✓ Сонгосон</div>}
            </div>
          ))}
          <button style={S.startBtn} onClick={()=>setScreen("quiz")}>Эхлэх →</button>
        </div>
      )}

      {screen==="quiz"&&(
        <div style={S.wrap}>
          <div style={S.topBar}>
            <button style={S.backBtn} onClick={toMenu}>← Menu</button>
            <div style={S.progWrap}>
              <div style={S.progBar}><div style={{...S.progFill,width:`${Object.keys(answers).length/qs.length*100}%`}}/></div>
              <span style={S.progTxt}>{Object.keys(answers).length}/{qs.length}</span>
            </div>
          </div>
          <div style={S.qList}>
            {qs.map(q=>(
              <div key={q.id} style={S.qCard}>
                <div style={S.qNum}>Q{q.id}</div>
                <div style={S.qText}>{q.text}</div>
                <div style={S.optGrid}>
                  {q.options.map((opt,i)=>(
                    <button key={i} style={{...S.optBtn,...(answers[q.id]===i?S.optChosen:{})}} onClick={()=>pick(q.id,i)}>
                      <span style={S.optLbl}>{LABELS[i]}</span>{opt}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={S.submitWrap}>
            <button style={S.submitBtn} onClick={submit}>Дуусгах ✓</button>
          </div>
        </div>
      )}

      {screen==="result"&&(
        <div style={S.resWrap}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
            <div style={{...S.gradeCircle,borderColor:gc,color:gc}}>{grade}</div>
            <div style={S.scoreNum}>{score}/{qs.length}</div>
            <div style={S.scorePct}>{pct}%</div>
          </div>
          <div style={S.resActions}>
            <button style={S.btn1} onClick={restart}>🔄 Дахин оролдох</button>
            <button style={S.btn2} onClick={()=>setScreen("review")}>👁 Хариулт харах</button>
            <button style={S.btn3} onClick={toMenu}>🏠 Меню</button>
          </div>
        </div>
      )}

      {screen==="review"&&(
        <div style={S.wrap}>
          <div style={S.topBar}>
            <button style={S.backBtn} onClick={()=>setScreen("result")}>← Буцах</button>
            <span style={{color:"#ffd6a5",fontWeight:700,fontSize:14}}>Хариулт — {score}/{qs.length}</span>
          </div>
          <div style={S.qList}>
            {qs.map(q=>{
              const chosen=answers[q.id],correct=q.answer,right=chosen===correct;
              return(
                <div key={q.id} style={{...S.qCard,borderLeft:`4px solid ${right?"#22c55e":"#ef4444"}`}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={S.qNum}>Q{q.id}</div>
                    <span>{right?"✅":"❌"}</span>
                  </div>
                  <div style={S.qText}>{q.text}</div>
                  <div style={S.optGrid}>
                    {q.options.map((opt,i)=>{
                      const isC=i===correct,isW=i===chosen&&!isC;
                      return(
                        <div key={i} style={{...S.optBtn,cursor:"default",...(isC?S.optCorrect:{}),...(isW?S.optWrong:{})}}>
                          <span style={S.optLbl}>{LABELS[i]}</span>{opt}{isC?" ✓":""}{isW?" ✗":""}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
("root")).render(<App/>);
</script>
</body>
</html>
